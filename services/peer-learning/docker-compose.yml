version: "3.9"

services:
  # ─── MongoDB ───────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: peer_learning_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: peer_learning
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: peer_learning_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Ollama (gemma4) ───────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: peer_learning_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Pull gemma4 model on startup
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull gemma4:latest && wait"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ─── Application ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peer_learning_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: peer_learning
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: gemma4:latest
      OLLAMA_TIMEOUT: "120"
      REDIS_URL: redis://redis:6379
      APP_SECRET_KEY: ${APP_SECRET_KEY:-change-me-in-production}
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      APP_DEBUG: "false"
      NOTIFICATION_TTL_SECONDS: "60"
      WAITING_QUEUE_POLL_INTERVAL: "10"
      COMPATIBILITY_THRESHOLD: "60"
      MASTERY_THRESHOLD: "90"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo_data:
  mongo_config:
  redis_data:
  ollama_models:
